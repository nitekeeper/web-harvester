# .github/workflows/pr-checks.yml
name: PR Checks

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  # ──────────────────────────────────────────────────────────────
  # FAST (~1-2 min): Static analysis — fail early, no test runner
  # ──────────────────────────────────────────────────────────────
  fast:
    name: Fast Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for commitlint history

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.18.3/gitleaks_8.18.3_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks

      - name: TypeScript type check
        run: pnpm typecheck

      - name: Prettier format check
        run: pnpm format:check

      - name: ESLint
        run: pnpm lint

      - name: Dead code detection (knip)
        run: pnpm knip

      - name: Duplicate code detection (jscpd)
        run: pnpm lint:dupes

      - name: Secrets scan (gitleaks)
        run: gitleaks detect --source . --redact

      - name: Circular dependency check
        run: pnpm madge --circular --extensions ts src/

      - name: Commit message format (commitlint)
        run: pnpm commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

  # ──────────────────────────────────────────────────────────────
  # MEDIUM (~3-5 min): Tests, build, bundle, deps
  # ──────────────────────────────────────────────────────────────
  medium:
    name: Medium Checks
    runs-on: ubuntu-latest
    needs: fast
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Unit tests with coverage
        run: pnpm test:coverage

      - name: Build (Chrome)
        run: pnpm build:chrome

      - name: Manifest validation (web-ext lint)
        run: pnpm lint:manifest

      - name: Bundle size check
        run: pnpm size-limit

      - name: Dependency vulnerability audit
        run: pnpm audit --audit-level high

      - name: License compatibility check
        run: pnpm license-checker --onlyAllow "MIT;ISC;Apache-2.0;BSD-2-Clause;BSD-3-Clause;0BSD;CC0-1.0;CC-BY-3.0;CC-BY-4.0;Unlicense;BlueOak-1.0.0;OFL-1.1"

      - name: JSDoc check on public interfaces
        run: pnpm jsdoc-check

  # ──────────────────────────────────────────────────────────────
  # SLOW (~5-10 min): Browser and E2E tests, deep scan
  # ──────────────────────────────────────────────────────────────
  slow:
    name: Slow Checks
    runs-on: ubuntu-latest
    needs: medium
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm playwright install --with-deps chromium

      - name: Browser unit tests
        run: pnpm test:browser

      - name: E2E tests
        run: pnpm test:e2e

      - name: Snyk deep vulnerability scan
        if: env.SNYK_TOKEN != ''
        uses: snyk/actions/node@master
        with:
          args: --severity-threshold=high
